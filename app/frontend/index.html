<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Syd Marketing Assistant</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9fafb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 15px 20px;
      font-size: 20px;
      font-weight: bold;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .msg {
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 10px;
      max-width: 70%;
      word-wrap: break-word;
      font-size: 15px;
      line-height: 1.4;
    }

    .msg.user {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .msg.bot {
      background: #e5e5ea;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
      background: #f3f4f6;
      padding: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    .input-area button {
      margin-left: 10px;
      padding: 12px 18px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    .input-area button:hover {
      background: #1e40af;
    }
  </style>

  <script>
    let ws;

    function connect() {
      const chatBox = document.getElementById("chat-box");
      ws = new WebSocket("ws://127.0.0.1:7860/chat");

      ws.onopen = () => {
        chatBox.innerHTML += `<div class="msg bot">✅ Connected to Syd</div>`;
      };
      //onmessage triggers as soon as a message is received from the websocket server
      ws.onmessage = (event) => {
        chatBox.innerHTML += `<div class="msg bot">${event.data}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
      };

      ws.onclose = () => {
        chatBox.innerHTML += `<div class="msg bot">❌ Disconnected</div>`;
      };
    }

    function sendMessage() {
      const input = document.getElementById("user-input");
      const message = input.value.trim();
      if (!message || !ws) return;
      ws.send(message);
      const chatBox = document.getElementById("chat-box");
      chatBox.innerHTML += `<div class="msg user">${message}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      input.value = "";
    }

    window.onload = connect;
  </script>
</head>
<body>
  <header>Syd – Marketing Assistant</header>
  <div id="chat-box"></div>
  <div class="input-area">
    <input
      id="user-input"
      type="text"
      placeholder="Type a message..."
      onkeypress="if(event.key==='Enter') sendMessage()"
    />
    <button onclick="sendMessage()">Send</button>
  </div>
</body>
</html>
